<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARIA — Asistente IA · RETROTERM.AI</title>
  <meta name="description" content="ARIA, el asistente de inteligencia artificial integrado en RETROTERM.AI.">
  <meta name="robots" content="index,follow">
  <link rel="stylesheet" href="estilos.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <style>
    /* ── LAYOUT RAÍZ ── */
    body { overflow: hidden; }

    .aria-root {
      display: flex;
      height: 100vh;
      width: 100%;
      position: fixed;
      top: 0; left: 0;
      background: #000;
      font-family: 'Courier New', monospace;
    }

    /* ══════════════════════════════════════
       SIDEBAR — historial de conversaciones
    ══════════════════════════════════════ */
    .aria-sidebar {
      width: 240px;
      background: #040804;
      border-right: 1px solid #0a2a0a;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: width 0.2s ease, padding 0.2s ease;
      overflow: hidden;
      position: relative;
      z-index: 10;
    }
    .aria-sidebar.collapsed { width: 0; border-right: none; }

    .sb-header {
      padding: 12px 12px 8px;
      border-bottom: 1px solid #0a2a0a;
      flex-shrink: 0;
    }
    .sb-title {
      font-size: 0.6rem;
      letter-spacing: 3px;
      color: #1a5a2a;
      margin-bottom: 8px;
      white-space: nowrap;
    }
    .sb-new-btn {
      width: 100%;
      background: none;
      border: 1px solid #003300;
      color: #1a5a2a;
      font-family: 'Courier New', monospace;
      font-size: 0.65rem;
      letter-spacing: 1px;
      padding: 7px 0;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .sb-new-btn:hover {
      border-color: #00ff66;
      color: #00ff66;
      background: rgba(0,255,102,0.04);
    }

    .sb-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
      scrollbar-width: thin;
      scrollbar-color: #003300 #000;
    }
    .sb-list::-webkit-scrollbar { width: 3px; }
    .sb-list::-webkit-scrollbar-thumb { background: #003300; }

    .sb-conv {
      padding: 9px 12px;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: all 0.15s;
      position: relative;
      white-space: nowrap;
      overflow: hidden;
    }
    .sb-conv:hover { background: rgba(0,255,102,0.03); border-left-color: #003300; }
    .sb-conv.active { background: rgba(0,255,102,0.06); border-left-color: #00ff66; }
    .sb-conv-title {
      font-size: 0.67rem;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }
    .sb-conv.active .sb-conv-title { color: #00ff66; }
    .sb-conv-meta {
      font-size: 0.57rem;
      color: #1a4a2a;
      letter-spacing: 1px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sb-conv-del {
      opacity: 0;
      color: #ff5555;
      font-size: 0.6rem;
      padding: 0 2px;
      transition: opacity 0.15s;
      cursor: pointer;
      flex-shrink: 0;
    }
    .sb-conv:hover .sb-conv-del { opacity: 1; }

    .sb-footer {
      padding: 8px 12px;
      border-top: 1px solid #0a2a0a;
      font-size: 0.57rem;
      color: #1a3a1a;
      letter-spacing: 1px;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .sb-footer span { color: #1a5a2a; }

    /* Toggle sidebar */
    .sb-toggle {
      position: absolute;
      top: 50%;
      right: -11px;
      transform: translateY(-50%);
      width: 11px;
      height: 36px;
      background: #0a0a0a;
      border: 1px solid #0a2a0a;
      border-left: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.5rem;
      color: #1a4a2a;
      z-index: 20;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .sb-toggle:hover { color: #00ff66; background: rgba(0,255,102,0.06); }

    /* ══════════════════════════════════════
       ÁREA PRINCIPAL
    ══════════════════════════════════════ */
    .aria-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }

    /* TOPBAR */
    .aria-topbar {
      background: #030803;
      border-bottom: 1px solid #0a2a0a;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .aria-avatar {
      width: 54px; height: 72px;
      border: 1px solid #00ff66;
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      box-shadow: 0 0 8px rgba(0,255,102,0.3);
      flex-shrink: 0;
      animation: pulse-avatar 3s ease-in-out infinite;
      background: #050808;
    }
    @keyframes pulse-avatar {
      0%,100% { box-shadow: 0 0 6px rgba(0,255,102,0.3); }
      50%      { box-shadow: 0 0 16px rgba(0,255,102,0.6); }
    }
    .aria-info { flex: 1; min-width: 0; }
    .aria-name {
      color: #00ff66;
      font-size: 0.82rem;
      letter-spacing: 2px;
      text-shadow: 0 0 6px #00ff66;
    }
    .aria-tagline {
      font-size: 0.58rem;
      color: #1a4a2a;
      letter-spacing: 2px;
      font-style: italic;
      margin-bottom: 2px;
    }
    .aria-status {
      font-size: 0.63rem;
      color: #1a5a2a;
      letter-spacing: 1px;
    }
    .aria-status::before { content: '● '; color: #00ff66; animation: blink 1.5s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .aria-topbar-btns { display: flex; gap: 6px; flex-shrink: 0; }
    .topbar-btn {
      background: none;
      border: 1px solid #0a2a0a;
      color: #1a4a2a;
      font-family: 'Courier New', monospace;
      font-size: 0.6rem;
      letter-spacing: 1px;
      padding: 4px 9px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .topbar-btn:hover { border-color: #00ff66; color: #00ff66; }
    .topbar-btn.danger:hover { border-color: #ff5555; color: #ff5555; }
    .mob-menu-btn {
      display: none;
      background: none;
      border: 1px solid #0a2a0a;
      color: #1a4a2a;
      font-family: 'Courier New', monospace;
      font-size: 0.7rem;
      padding: 4px 9px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .mob-menu-btn:hover { border-color: #00ff66; color: #00ff66; }

    /* CHAT AREA */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
      background-image: repeating-linear-gradient(
        to bottom,
        rgba(0,255,102,0.012) 0px,
        rgba(0,255,102,0.012) 1px,
        transparent 2px
      );
    }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-thumb { background: #003300; border-radius: 2px; }

    .msg-sistema {
      text-align: center;
      font-size: 0.67rem;
      color: #1a4a2a;
      letter-spacing: 2px;
      padding: 4px 0 10px;
      border-bottom: 1px solid #0a1a0a;
    }

    /* MENSAJES */
    .msg-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      animation: msgIn 0.2s ease-out;
    }
    @keyframes msgIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
    .msg-row.usuario { flex-direction: row-reverse; }
    .msg-icon {
      width: 26px; height: 26px;
      border: 1px solid #003300;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .msg-row.usuario .msg-icon { border-color: #1a4a2a; }
    .msg-burbuja {
      max-width: 76%;
      padding: 9px 13px;
      font-size: 0.85rem;
      line-height: 1.65;
    }
    .msg-row.aria .msg-burbuja {
      border: 1px solid #003300;
      border-left: 2px solid #00ff66;
      background: rgba(0,20,0,0.7);
      color: #ddd;
    }
    .msg-row.usuario .msg-burbuja {
      border: 1px solid #1a4a2a;
      border-right: 2px solid #66ffb3;
      background: rgba(0,30,15,0.5);
      color: #66ffb3;
      text-align: right;
    }
    .msg-prefix {
      font-size: 0.68rem;
      letter-spacing: 1px;
      margin-bottom: 4px;
      display: block;
      color: #00ff66;
    }
    .msg-row.usuario .msg-prefix { color: #66ffb3; }
    .msg-timestamp {
      font-size: 0.6rem;
      color: #333;
      margin-top: 5px;
      display: block;
    }
    .msg-row.usuario .msg-timestamp { text-align: right; }

    /* TYPING */
    .typing-indicator {
      display: none;
      gap: 4px;
      align-items: center;
      padding: 8px 12px;
    }
    .typing-indicator.visible { display: flex; }
    .typing-dot {
      width: 5px; height: 5px;
      background: #00ff66;
      border-radius: 50%;
      animation: typeBounce 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typeBounce {
      0%,60%,100% { transform:translateY(0); opacity:0.4; }
      30%          { transform:translateY(-5px); opacity:1; }
    }
    .typing-text { font-size: 0.68rem; color: #00ff66; letter-spacing: 1px; margin-left: 6px; }

    /* INPUT */
    .chat-input-area {
      border-top: 1px solid #0a2a0a;
      background: #020602;
      padding: 10px 16px;
      flex-shrink: 0;
    }
    .chat-input-row {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid #003300;
      padding: 6px 12px;
      transition: border-color 0.2s;
    }
    .chat-input-row:focus-within { border-color: #00ff66; }
    .chat-prompt { color: #00ff66; font-size: 0.9rem; flex-shrink: 0; }
    .chat-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #00ff66;
      font-family: 'Courier New', monospace;
      font-size: 0.88rem;
      caret-color: #00ff66;
    }
    .chat-input::placeholder { color: #1a3a1a; }
    .chat-input:disabled { opacity: 0.4; }
    .chat-send-btn {
      background: none;
      border: 1px solid #003300;
      color: #1a5a2a;
      font-family: 'Courier New', monospace;
      font-size: 0.7rem;
      padding: 5px 12px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .chat-send-btn:hover:not(:disabled) {
      border-color: #00ff66;
      color: #000;
      background: #00ff66;
    }
    .chat-send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .chat-meta {
      display: flex;
      justify-content: space-between;
      margin-top: 5px;
      font-size: 0.6rem;
      color: #1a3a1a;
      letter-spacing: 1px;
    }
    .chat-counter.warn { color: #ffaa00; }

    /* EMPTY STATE */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #1a4a2a;
    }
    .empty-state .es-icon { font-size: 2.5rem; opacity: 0.3; }
    .empty-state .es-txt  { font-size: 0.72rem; letter-spacing: 2px; }
    .empty-state .es-sub  { font-size: 0.62rem; color: #0f2a0f; letter-spacing: 1px; }

    /* MOBILE OVERLAY sidebar */
    .sb-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 9;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      .aria-sidebar {
        position: fixed;
        top: 0; left: 0;
        height: 100vh;
        z-index: 10;
        width: 0;
      }
      .aria-sidebar.mob-open { width: 240px; }
      .sb-toggle { display: none; }
      .mob-menu-btn { display: flex; align-items: center; }
      .sb-overlay.visible { display: block; }
      .msg-burbuja { max-width: 88%; font-size: 0.82rem; }
    }
  </style>
</head>

      <div class="typing-indicator" id="typing-indicator">
        <div class="msg-icon" style="width:26px;height:28px;border:none;background:none;overflow:visible;">
          <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABQAAAAcCAIAAADuuAg3AAADi0lEQVR4nJVUXWhbZRh+vpMsOaeuVFlPuv4gtmw3Nk1sMzOmbq0Z2rCuNYPFZpRNQv0Bb8XrIcxLb8a88AcUJTAEMbZKN1Cb+sNiJA1JOnoR1kahbcyhkNqRc5am5/XiS89pzirDc/V+73me93m+97zvYTqR5BTBAOiAgP/zCP8RP/LRAQiSKKoPtEfiAL0RkKlkbwAIYE2Ecb/XUmO9ak8vZfbDBACS2GIRH/d7Z1N3OWG92hDoaqkDgo5mMvezu7uXJ8z9nrVTfY8Agw/U9zeGOZ1Ozqzt1CRRNF743IPffPrefjsXXr8KIJtP15nQRAagahonj/sH1qt2CxNApai4I9MCBEDnPTJdTEamVU2zoPtOngfQd/J8pai0HT0iQN/drQON7prkmXjMiN8afZ40PXrtxr2FGQD3Fmb6w1EAOgSb7aE7G84BSGJL7uYnANqOHrE47zk9ETrlnU3l+bFpqvYaVuc6AJgobJU2mSgA2CptOgXE72QNvHUkJbFF1Wp+ry967cZWadN0KAruyHQdgt/rO9i2YV4SRUAY8J2JvXv58afkSlHxTE43j+BByjyjalpw+DQR+sPRSlEZmowOnBhxD41MhKbMWXqILASCF8dCV8rJWz8k5vue7H7GHwDwQIcsu2RZ3lZrL41FAsFXeQnTts89aGvreOxwK2Ps+/gXAF44car72NPbaq20sdbZ1UNEjDEARJRL/djZ6zGV00uZqqrN3/6aiM69crkQj6WyaQCtkqOzq8eAEVFpY62z17O0+HOTbcYQCF5UFIUxdjw0Vdup3dd2ADjUvwFw2dLGmv2QgzE0LcmLo2FemB/HQlcK8RgRFVZWHU/0/DT3Fc8v55J8HALBiLXbvLyilPnxkrtjOZcsrKxOXJg6LB4ql8sDvjN8EImoidzeLt/f/ofHkX6XJ/JGMPzyuL8fQGFlldZzvfbNvZuDMWa5M6uqWm4xkU0nPrr920ToEoAPr7+/nPv1mLjNMdl0or1dPkCZiFwu19nRsNc3YmvrMPJ/Jb/7NpVnXZ7Z1N2zo2HGmMvlUhTF/M7uoRHecEPhWfdgce3PzNznPPPa1S9bJcdMPGYgTeWlxQRjIALvt0BI5zPPHe+uFBXSGiNZWFnVAVmWAeTTCcti6Pz/eG542EjdWpjP3fws+Udm9peF+J2szWbqHbBV1oEnHUz4+J233/zgOmAH6cZ6/QtVVHfB0naRnAAAAABJRU5ErkJggg==" width="20" height="28" style="image-rendering:pixelated;display:block;" alt="ARIA"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <span class="typing-text">PROCESANDO...</span>
      </div>
    </div>

    <!-- Input -->
    <div class="chat-input-area">
      <div class="chat-input-row">
        <span class="chat-prompt">&gt;_</span>
        <input
          type="text"
          id="chat-input"
          class="chat-input"
          placeholder="Escribe tu consulta..."
          maxlength="500"
          autocomplete="off"
          disabled
        >
        <button class="chat-send-btn" id="send-btn" onclick="enviar()" disabled>ENVIAR</button>
      </div>
      <div class="chat-meta">
        <span>// ENTER para enviar · conversación activa: <span id="conv-titulo">—</span></span>
        <span class="chat-counter" id="char-counter">0 / 500</span>
      </div>
    </div>

  </div><!-- /aria-main -->
</div><!-- /aria-root -->

<script>
// ══════════════════════════════════════════════════
//  CONSTANTES Y ESTADO
// ══════════════════════════════════════════════════
const WORKER_URL   = 'https://divine-river-2557.ivan-asir2-cdm.workers.dev/';
const MAX_CONVS    = 15;   // máx conversaciones guardadas
const MAX_MSGS     = 30;   // máx mensajes por conversación
const MAX_CTX      = 20;   // máx mensajes enviados a la IA
const LS_KEY       = 'aria_convs';

let convs       = [];   // array de conversaciones guardadas
let convActual  = null; // id de la conversación activa
let historialIA = [];   // mensajes enviados a la IA (en memoria)
let enviando    = false;

// ══════════════════════════════════════════════════
//  REFERENCIAS DOM
// ══════════════════════════════════════════════════
const chatArea   = document.getElementById('chat-area');
const typingEl   = document.getElementById('typing-indicator');
const inputEl    = document.getElementById('chat-input');
const sendBtn    = document.getElementById('send-btn');
const counterEl  = document.getElementById('char-counter');
const statusEl   = document.getElementById('aria-status');
const sbList     = document.getElementById('sb-list');
const emptyState = document.getElementById('empty-state');
const convTitulo = document.getElementById('conv-titulo');

// ══════════════════════════════════════════════════
//  LOCALSTORAGE
// ══════════════════════════════════════════════════
function cargarLS() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    convs = raw ? JSON.parse(raw) : [];
  } catch(e) { convs = []; }
}

function guardarLS() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify(convs));
    actualizarFooter();
  } catch(e) {
    // Storage lleno — eliminar la conversación más antigua
    if (convs.length > 1) {
      const idActual = convActual;
      const masAntigua = convs.filter(c => c.id !== idActual)
        .sort((a,b) => a.ts - b.ts)[0];
      if (masAntigua) {
        convs = convs.filter(c => c.id !== masAntigua.id);
        guardarLS();
      }
    }
  }
}

function actualizarFooter() {
  document.getElementById('sb-count').textContent = convs.length;
  try {
    const bytes = new Blob([localStorage.getItem(LS_KEY)||'']).size;
    document.getElementById('sb-size').textContent =
      `localStorage: ${(bytes/1024).toFixed(1)} KB`;
  } catch(e) {}
}

// ══════════════════════════════════════════════════
//  GESTIÓN DE CONVERSACIONES
// ══════════════════════════════════════════════════
function nuevaConversacion() {
  // Si hay límite, eliminar la más antigua (que no sea la activa)
  if (convs.length >= MAX_CONVS) {
    const masAntigua = [...convs]
      .filter(c => c.id !== convActual)
      .sort((a,b) => a.ts - b.ts)[0];
    if (masAntigua) convs = convs.filter(c => c.id !== masAntigua.id);
  }

  const id = 'conv_' + Date.now();
  const conv = {
    id,
    titulo: 'Nueva conversación',
    ts: Date.now(),
    msgs: []  // { rol, texto, hora }
  };
  convs.unshift(conv);
  guardarLS();
  cargarConversacion(id);
  renderSidebar();
  cerrarSidebarMob();
}

function cargarConversacion(id) {
  const conv = convs.find(c => c.id === id);
  if (!conv) return;

  convActual = id;
  historialIA = [];

  // Limpiar chat area (excepto typing)
  Array.from(chatArea.children).forEach(el => {
    if (!el.classList.contains('typing-indicator') && !el.classList.contains('empty-state')) {
      el.remove();
    }
  });
  emptyState.style.display = 'none';

  // Renderizar mensajes guardados
  if (conv.msgs.length === 0) {
    // Conversación nueva — mostrar bienvenida
    const sys = document.createElement('div');
    sys.className = 'msg-sistema';
    sys.textContent = `// SESIÓN ${conv.id.split('_')[1]} — ARIA v1.0 — RETROTERM.AI //`;
    chatArea.insertBefore(sys, typingEl);

    agregarMsgDOM('aria', 'Un hombre no tiene nombre. Pero yo sí tengo respuestas.\n\nSoy ARIA, el sistema integrado de RETROTERM.AI. Puedo ayudarte con programación, redes, sistemas o cualquier consulta técnica.\n\n¿Cuáles son tus preguntas?');
  } else {
    const sys = document.createElement('div');
    sys.className = 'msg-sistema';
    sys.textContent = `// SESIÓN ${conv.id.split('_')[1]} — ARIA v1.0 — RETROTERM.AI //`;
    chatArea.insertBefore(sys, typingEl);

    conv.msgs.forEach(m => {
      agregarMsgDOM(m.rol, m.texto, m.hora, false);
      if (m.rol === 'usuario') historialIA.push({ role:'user',      content: m.texto });
      else                     historialIA.push({ role:'assistant', content: m.texto });
    });

    // Limitar historialIA al contexto máximo
    if (historialIA.length > MAX_CTX) historialIA = historialIA.slice(-MAX_CTX);
  }

  // Habilitar input
  inputEl.disabled = false;
  sendBtn.disabled = false;
  convTitulo.textContent = conv.titulo;
  chatArea.scrollTop = chatArea.scrollHeight;
  inputEl.focus();

  renderSidebar();
}

function eliminarConversacion(id, e) {
  e.stopPropagation();
  convs = convs.filter(c => c.id !== id);
  guardarLS();

  if (convActual === id) {
    convActual = null;
    historialIA = [];
    // Limpiar chat
    Array.from(chatArea.children).forEach(el => {
      if (!el.classList.contains('typing-indicator') && !el.classList.contains('empty-state')) el.remove();
    });
    emptyState.style.display = 'flex';
    inputEl.disabled = true;
    sendBtn.disabled = true;
    convTitulo.textContent = '—';
  }

  renderSidebar();
}

function confirmarBorrarTodo() {
  if (!convs.length) return;
  if (!confirm('¿Borrar todas las conversaciones? Esta acción no se puede deshacer.')) return;
  convs = [];
  convActual = null;
  historialIA = [];
  guardarLS();
  Array.from(chatArea.children).forEach(el => {
    if (!el.classList.contains('typing-indicator') && !el.classList.contains('empty-state')) el.remove();
  });
  emptyState.style.display = 'flex';
  inputEl.disabled = true;
  sendBtn.disabled = true;
  convTitulo.textContent = '—';
  renderSidebar();
}

// ══════════════════════════════════════════════════
//  RENDER SIDEBAR
// ══════════════════════════════════════════════════
function renderSidebar() {
  actualizarFooter();
  if (!convs.length) {
    sbList.innerHTML = `<div style="padding:16px 12px;font-size:0.62rem;color:#0f2a0f;letter-spacing:1px;line-height:1.8;">
      Sin conversaciones.<br>Pulsa [ + NUEVA ] para empezar.
    </div>`;
    return;
  }
  sbList.innerHTML = convs.map(c => `
    <div class="sb-conv ${c.id === convActual ? 'active' : ''}" onclick="cargarConversacion('${c.id}')">
      <div class="sb-conv-title">${escHTML(c.titulo)}</div>
      <div class="sb-conv-meta">
        <span>${fFecha(c.ts)}</span>
        <span>${c.msgs.length} msg</span>
        <span class="sb-conv-del" onclick="eliminarConversacion('${c.id}', event)" title="Eliminar">✕</span>
      </div>
    </div>`).join('');
}

// ══════════════════════════════════════════════════
//  ENVIAR MENSAJE
// ══════════════════════════════════════════════════
async function enviar() {
  const texto = inputEl.value.trim();
  if (!texto || enviando || !convActual) return;

  enviando = true;
  inputEl.disabled = true;
  sendBtn.disabled = true;
  statusEl.textContent = 'PROCESANDO...';

  // Añadir al DOM
  agregarMsgDOM('usuario', texto);
  inputEl.value = '';
  counterEl.textContent = '0 / 500';
  counterEl.className = 'chat-counter';

  // Guardar en conversación
  const conv = convs.find(c => c.id === convActual);
  if (conv) {
    conv.msgs.push({ rol:'usuario', texto, hora: horaActual() });
    // Actualizar título con el primer mensaje del usuario
    if (conv.msgs.filter(m => m.rol === 'usuario').length === 1) {
      conv.titulo = texto.slice(0, 38) + (texto.length > 38 ? '…' : '');
      convTitulo.textContent = conv.titulo;
    }
    conv.ts = Date.now();
    // Límite de mensajes
    if (conv.msgs.length > MAX_MSGS) conv.msgs = conv.msgs.slice(-MAX_MSGS);
  }

  // Añadir al contexto IA
  historialIA.push({ role:'user', content: texto });
  if (historialIA.length > MAX_CTX) historialIA = historialIA.slice(-MAX_CTX);

  mostrarTyping(true);

  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mensaje: texto, historial: historialIA.slice(0,-1) })
    });
    const data = await res.json();
    const respuesta = data.respuesta || '[ERROR] Sin respuesta del sistema.';

    mostrarTyping(false);
    agregarMsgDOM('aria', respuesta);

    // Guardar respuesta
    if (conv) {
      conv.msgs.push({ rol:'aria', texto: respuesta, hora: horaActual() });
      if (conv.msgs.length > MAX_MSGS) conv.msgs = conv.msgs.slice(-MAX_MSGS);
      guardarLS();
    }

    historialIA.push({ role:'assistant', content: respuesta });
    if (historialIA.length > MAX_CTX) historialIA = historialIA.slice(-MAX_CTX);

    statusEl.textContent = 'SIN NOMBRE · EN LÍNEA';
    renderSidebar();

  } catch(e) {
    mostrarTyping(false);
    agregarMsgDOM('aria', '[ERROR] Fallo de conexión con el sistema. Comprueba tu red e inténtalo de nuevo.');
    statusEl.textContent = 'ERROR DE CONEXIÓN';
    setTimeout(() => { statusEl.textContent = 'SIN NOMBRE · EN LÍNEA'; }, 3000);
    if (conv) guardarLS();
  }

  enviando = false;
  inputEl.disabled = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

// ══════════════════════════════════════════════════
//  DOM HELPERS
// ══════════════════════════════════════════════════
function agregarMsgDOM(rol, texto, hora, scroll = true) {
  mostrarTyping(false);
  const row = document.createElement('div');
  row.className = `msg-row ${rol}`;
  const icono = rol === 'aria'
    ? '<img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABQAAAAcCAIAAADuuAg3AAADi0lEQVR4nJVUXWhbZRh+vpMsOaeuVFlPuv4gtmw3Nk1sMzOmbq0Z2rCuNYPFZpRNQv0Bb8XrIcxLb8a88AcUJTAEMbZKN1Cb+sNiJA1JOnoR1kahbcyhkNqRc5am5/XiS89pzirDc/V+73me93m+97zvYTqR5BTBAOiAgP/zCP8RP/LRAQiSKKoPtEfiAL0RkKlkbwAIYE2Ecb/XUmO9ak8vZfbDBACS2GIRH/d7Z1N3OWG92hDoaqkDgo5mMvezu7uXJ8z9nrVTfY8Agw/U9zeGOZ1Ozqzt1CRRNF743IPffPrefjsXXr8KIJtP15nQRAagahonj/sH1qt2CxNApai4I9MCBEDnPTJdTEamVU2zoPtOngfQd/J8pai0HT0iQN/drQON7prkmXjMiN8afZ40PXrtxr2FGQD3Fmb6w1EAOgSb7aE7G84BSGJL7uYnANqOHrE47zk9ETrlnU3l+bFpqvYaVuc6AJgobJU2mSgA2CptOgXE72QNvHUkJbFF1Wp+ry967cZWadN0KAruyHQdgt/rO9i2YV4SRUAY8J2JvXv58afkSlHxTE43j+BByjyjalpw+DQR+sPRSlEZmowOnBhxD41MhKbMWXqILASCF8dCV8rJWz8k5vue7H7GHwDwQIcsu2RZ3lZrL41FAsFXeQnTts89aGvreOxwK2Ps+/gXAF44car72NPbaq20sdbZ1UNEjDEARJRL/djZ6zGV00uZqqrN3/6aiM69crkQj6WyaQCtkqOzq8eAEVFpY62z17O0+HOTbcYQCF5UFIUxdjw0Vdup3dd2ADjUvwFw2dLGmv2QgzE0LcmLo2FemB/HQlcK8RgRFVZWHU/0/DT3Fc8v55J8HALBiLXbvLyilPnxkrtjOZcsrKxOXJg6LB4ql8sDvjN8EImoidzeLt/f/ofHkX6XJ/JGMPzyuL8fQGFlldZzvfbNvZuDMWa5M6uqWm4xkU0nPrr920ToEoAPr7+/nPv1mLjNMdl0or1dPkCZiFwu19nRsNc3YmvrMPJ/Jb/7NpVnXZ7Z1N2zo2HGmMvlUhTF/M7uoRHecEPhWfdgce3PzNznPPPa1S9bJcdMPGYgTeWlxQRjIALvt0BI5zPPHe+uFBXSGiNZWFnVAVmWAeTTCcti6Pz/eG542EjdWpjP3fws+Udm9peF+J2szWbqHbBV1oEnHUz4+J233/zgOmAH6cZ6/QtVVHfB0naRnAAAAABJRU5ErkJggg==" width="20" height="28" style="image-rendering:pixelated;display:block;" alt="ARIA">'
    : '👤';
  const prefijo = rol === 'aria' ? 'ARIA &gt;' : 'USR &gt;';
  row.innerHTML = `
    <div class="msg-icon">${icono}</div>
    <div class="msg-burbuja">
      <span class="msg-prefix">${prefijo}</span>
      ${escHTML(texto)}
      <span class="msg-timestamp">${hora || horaActual()}</span>
    </div>`;
  chatArea.insertBefore(row, typingEl);
  if (scroll) chatArea.scrollTop = chatArea.scrollHeight;
}

function mostrarTyping(v) {
  typingEl.classList.toggle('visible', v);
  if (v) chatArea.scrollTop = chatArea.scrollHeight;
}

// ══════════════════════════════════════════════════
//  SIDEBAR TOGGLE
// ══════════════════════════════════════════════════
let sidebarCollapsed = false;
function toggleSidebar() {
  sidebarCollapsed = !sidebarCollapsed;
  document.getElementById('sidebar').classList.toggle('collapsed', sidebarCollapsed);
  document.getElementById('sb-toggle').textContent = sidebarCollapsed ? '▶' : '◀';
}
function abrirSidebarMob() {
  document.getElementById('sidebar').classList.add('mob-open');
  document.getElementById('sb-overlay').classList.add('visible');
}
function cerrarSidebarMob() {
  document.getElementById('sidebar').classList.remove('mob-open');
  document.getElementById('sb-overlay').classList.remove('visible');
}

// ══════════════════════════════════════════════════
//  UTILIDADES
// ══════════════════════════════════════════════════
function horaActual() {
  const d = new Date();
  return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}:${d.getSeconds().toString().padStart(2,'0')}`;
}

function fFecha(ts) {
  const d = new Date(ts);
  const hoy = new Date();
  if (d.toDateString() === hoy.toDateString()) return horaActual().slice(0,5);
  return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}`;
}

function escHTML(str) {
  return str
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\n/g,'<br>');
}

// ══════════════════════════════════════════════════
//  INPUT EVENTS
// ══════════════════════════════════════════════════
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviar(); }
});
inputEl.addEventListener('input', () => {
  const len = inputEl.value.length;
  counterEl.textContent = `${len} / 500`;
  counterEl.className = 'chat-counter' + (len > 400 ? ' warn' : '');
});

// ══════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════
cargarLS();
renderSidebar();
actualizarFooter();

// Si hay conversaciones, cargar la más reciente automáticamente
if (convs.length > 0) {
  cargarConversacion(convs[0].id);
} else {
  // Sin conversaciones — autocrear una nueva
  nuevaConversacion();
}
</script>
