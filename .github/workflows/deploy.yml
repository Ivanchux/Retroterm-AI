Entiendo. El registro crea el usuario en Authentication pero el setDoc falla silenciosamente.

El problema es que onAuthStateChanged en login.html detecta la sesión y redirige a perfil.html antes de que el setDoc termine de ejecutarse.

Necesito cambiar el orden en registerUser — primero crear el documento y luego resolver. Pero más importante, necesito que el onAuthStateChanged no redirija hasta que el documento esté creado.

La solución es modificar login.html para que el redirect lo controle handleSubmit directamente, no onAuthStateChanged. Actualiza el script module de login.html con esto:

javascript
// Procesar resultado de redirect de Google
handleGoogleRedirect().catch(console.error);

// Solo redirigir al perfil si ya habia sesion ANTES de cargar la pagina
let paginaRecienCargada = true;
setTimeout(() => { paginaRecienCargada = false; }, 3000);

onAuthStateChanged(auth, (user) => {
  if (user && !paginaRecienCargada) return; // login manual — handleSubmit ya redirige
  if (user && paginaRecienCargada) {
    window.location.replace('/Retroterm-AI/perfil.html');
  }
});
