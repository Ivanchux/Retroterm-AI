11 abr
Es el bucle de redirección que temíamos. Está pasando esto:

login.html carga → requireAuth() comprueba sesión
Firebase tarda un momento en inicializarse → detecta "sin sesión"
Redirige a login.html → vuelta al paso 1 → bucle infinito
El fix es en login.html. En el script module, cambia esta parte:

js
try {
    const user = await requireAuth().catch(() => null);
    if (user) {
      window.location.replace('perfil.html');
    }
  } catch (_) { /* sin sesión, continuar */ }
Por esto:

js
import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { auth } from './firebase-config.js';

onAuthStateChanged(auth, (user) => {
  if (user) {
    window.location.replace('/Retroterm-AI/perfil.html');
  }
});
Esto elimina el requireAuth() del login — ese middleware solo debe usarse en perfil.html, nunca en login.html. El bucle se corta porque onAuthStateChanged espera correctamente a que Firebase inicialice antes de decidir.

