name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generar firebase-config.js con secrets
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
        run: |
          printf 'import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";\nimport { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";\nimport { getFirestore } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";\n\nconst firebaseConfig = {\n  apiKey: "%s",\n  authDomain: "%s",\n  projectId: "%s",\n  storageBucket: "%s",\n  messagingSenderId: "%s",\n  appId: "%s",\n  measurementId: "%s"\n};\n\nconst app = initializeApp(firebaseConfig);\nexport const auth = getAuth(app);\nexport const db = getFirestore(app);\n' \
            "$FIREBASE_API_KEY" \
            "$FIREBASE_AUTH_DOMAIN" \
            "$FIREBASE_PROJECT_ID" \
            "$FIREBASE_STORAGE_BUCKET" \
            "$FIREBASE_MESSAGING_SENDER_ID" \
            "$FIREBASE_APP_ID" \
            "$FIREBASE_MEASUREMENT_ID" > firebase-config.js
          echo "firebase-config.js generado:"
          cat firebase-config.js

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
