Los 4 archivos están listos. Aquí el resumen de lo que hace cada uno:

login.html — creado desde cero con la estética CRT exacta del proyecto (.pantalla, .terminal-header, .btn-perfil, fondo animado idéntico al de perfil.html). Tiene un único formulario con dos tabs [ENTRAR] / [REGISTRARSE] que alterna el campo de username. Llama a loginUser() o registerUser() de auth.js según el modo. El área de status log muestra errores traducidos al español (credenciales inválidas, email en uso, etc.). Si ya hay sesión activa al entrar, redirige directo a perfil.html sin mostrar el formulario.

perfil.html — refactorizado con type="module". Al cargar: primero llama a requireAuth() del middleware (redirige a login.html si no hay sesión), luego hace getDoc de users/{uid} y rellena #campo-nombre, #campo-email, #campo-bio, #stat-proyectos, #stat-sesiones, #stat-articulos, #stat-registro. El contador de sesiones se incrementa en Firestore en cada visita. El botón #btn-cerrar-sesion llama a logoutUser() y vuelve al index.

index.html — añadido el botón #btn-acceso en el header y un script módulo con onAuthStateChanged. Si hay sesión: muestra [ MI PERFIL ] apuntando a perfil.html y pone el username en el status bar. Si no: muestra [ LOGIN ] apuntando a login.html.

firestore.rules — cada usuario solo puede leer y actualizar users/{userId} donde docId == auth.uid. El create valida que tenga username, email y role, y que el email coincida con el de Firebase Auth. El update bloquea que el usuario se escale el rol. El delete está deshabilitado.

Sin bucles de redirección: login.html redirige a perfil.html (y si ya está autenticado también). perfil.html redirige a login.html solo si no hay sesión. index.html no redirige nunca.


