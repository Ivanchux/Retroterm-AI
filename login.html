<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACCESO AL SISTEMA — RETROTERM.AI</title>
  <meta name="description" content="Accede o regístrate en RETROTERM.AI">
  <link rel="canonical" href="https://ivanchux.github.io/Retroterm-AI/login.html">
  <link rel="stylesheet" href="estilos.css">
  <link rel="stylesheet" href="accesibilidad.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <meta name="robots" content="noindex,nofollow">
  <style>
    #bg-canvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; opacity:0.45; }
    .pantalla { background:transparent !important; border-color:#00ff6633 !important; box-shadow:0 0 15px #00ff6622 !important; }
    .login-wrap { max-width:460px; margin:0 auto; padding:0 0 40px; }
    .terminal-header { text-align:center; margin-bottom:28px; padding-bottom:16px; border-bottom:1px solid #003300; }
    .terminal-header h1 { font-size:1.5rem; color:#00ff66; text-shadow:0 0 10px #00ff66; margin:0 0 6px; letter-spacing:3px; }
    .terminal-header p { color:#66ffb3; font-size:0.72rem; margin:0; letter-spacing:1.5px; }
    .login-tabs { display:flex; margin-bottom:24px; border:1px solid #003300; }
    .login-tab { flex:1; padding:9px 0; text-align:center; font-family:'Courier New',monospace; font-size:0.75rem; letter-spacing:2px; cursor:pointer; background:transparent; color:#004d00; border:none; transition:all 0.2s; }
    .login-tab.activo { background:rgba(0,255,102,0.08); color:#00ff66; border-bottom:2px solid #00ff66; }
    .login-tab:hover:not(.activo) { color:#66ffb3; background:rgba(0,255,102,0.03); }
    .login-form { display:flex; flex-direction:column; gap:18px; }
    .login-campo { display:flex; flex-direction:column; gap:5px; }
    .login-campo label { font-size:0.62rem; color:#004d00; letter-spacing:2px; text-transform:uppercase; }
    .login-campo input { background:#000; color:#00ff66; border:none; border-bottom:1px solid #003300; font-family:'Courier New',monospace; font-size:0.9rem; padding:7px 2px; outline:none; transition:border-color 0.2s; width:100%; box-sizing:border-box; }
    .login-campo input:focus { border-bottom-color:#00ff66; box-shadow:0 2px 0 #00ff6622; }
    .login-campo input::placeholder { color:#003300; }
    .btn-perfil { padding:10px 20px; font-family:'Courier New',monospace; font-size:0.82rem; letter-spacing:2px; cursor:pointer; transition:all 0.2s; border:1px solid; text-transform:uppercase; }
    .btn-perfil.primario { background:#00ff66; color:#000; border-color:#00ff66; width:100%; margin-top:4px; }
    .btn-perfil.primario:hover { background:#00cc55; border-color:#00cc55; box-shadow:0 0 12px #00ff6655; }
    .btn-perfil.primario:disabled { opacity:0.4; cursor:not-allowed; background:#004d00; color:#00ff66; border-color:#003300; box-shadow:none; }
    .login-status { margin-top:20px; padding:12px 14px; border:1px solid #003300; background:rgba(0,10,0,0.5); font-size:0.72rem; min-height:48px; color:#004d00; line-height:1.8; letter-spacing:0.5px; font-family:'Courier New',monospace; }
    .login-status .log-ok { color:#00ff66; }
    .login-status .log-err { color:#ff4444; }
    .login-status .log-info { color:#66ffb3; }
    .login-status .log-wait { color:#ffaa00; }
    .campo-username { display:none; }
    .modo-registro .campo-username { display:flex; }
    .login-separador { display:flex; align-items:center; gap:10px; margin:20px 0 12px; font-size:0.62rem; color:#003300; letter-spacing:2px; }
    .login-separador::before, .login-separador::after { content:''; flex:1; border-top:1px solid #002200; }
    .btn-google { width:100%; padding:10px 20px; font-family:'Courier New',monospace; font-size:0.78rem; letter-spacing:1.5px; cursor:pointer; border:1px solid #003300; background:transparent; color:#66ffb3; transition:all 0.2s; text-transform:uppercase; }
    .btn-google:hover { border-color:#66ffb3; background:rgba(102,255,179,0.05); box-shadow:0 0 8px rgba(102,255,179,0.15); }
    .btn-google:disabled { opacity:0.4; cursor:not-allowed; }
    .login-footer { text-align:center; margin-top:28px; border-top:1px solid #002200; padding-top:16px; font-size:0.68rem; color:#004400; }
    .login-footer a { color:#66ffb3; text-decoration:none; }
    .login-footer a:hover { color:#00ff66; }
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<section class="pantalla activa" id="login-seccion">
  <div class="login-wrap">

    <div class="terminal-header">
      <h1>&#11041; ACCESO AL SISTEMA</h1>
      <p>// MÓDULO DE AUTENTICACIÓN — RETROTERM.AI v2.1</p>
    </div>

    <div class="login-tabs" role="tablist">
      <button class="login-tab activo" id="tab-login" role="tab" aria-selected="true" onclick="setModo('login')">[ ENTRAR ]</button>
      <button class="login-tab" id="tab-registro" role="tab" aria-selected="false" onclick="setModo('registro')">[ REGISTRARSE ]</button>
    </div>

    <div class="login-form" id="login-form">
      <div class="login-campo campo-username">
        <label for="input-username">NOMBRE DE USUARIO</label>
        <input type="text" id="input-username" placeholder="ivanchux" maxlength="32" autocomplete="username">
      </div>
      <div class="login-campo">
        <label for="input-email">EMAIL</label>
        <input type="email" id="input-email" placeholder="usuario@retroterm.ai" autocomplete="email">
      </div>
      <div class="login-campo">
        <label for="input-password">CONTRASEÑA</label>
        <input type="password" id="input-password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-perfil primario" id="btn-submit" onclick="handleSubmit()">[ ENTRAR AL SISTEMA ]</button>
    </div>

    <div class="login-separador">// O ACCEDE CON //</div>
    <button class="btn-google" id="btn-google" onclick="handleGoogle()">[ G ] ENTRAR CON GOOGLE</button>

    <div class="login-status" id="login-status" aria-live="polite">
      <span class="log-info">// Sistema listo. Introduce tus credenciales.</span>
    </div>

    <div class="login-footer">
      <a href="index.html">&#8592; Volver al HUB</a>
    </div>

  </div>
</section>

<script type="module">
  import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
  import { auth } from './firebase-config.js';
  import { loginUser, registerUser, loginWithGoogle } from './auth.js';

  // Si ya hay sesion activa, ir al perfil
  onAuthStateChanged(auth, (user) => {
    if (user) {
      window.location.replace('/Retroterm-AI/perfil.html');
    }
  });

  const log = (msg, cls = 'log-info') => {
    document.getElementById('login-status').innerHTML = '<span class="' + cls + '">' + msg + '</span>';
  };

  window.setModo = (modo) => {
    const esReg = modo === 'registro';
    document.getElementById('tab-login').classList.toggle('activo', !esReg);
    document.getElementById('tab-registro').classList.toggle('activo', esReg);
    document.getElementById('login-form').classList.toggle('modo-registro', esReg);
    document.getElementById('btn-submit').textContent = esReg ? '[ CREAR CUENTA ]' : '[ ENTRAR AL SISTEMA ]';
    document.getElementById('input-username').required = esReg;
    document.getElementById('input-password').autocomplete = esReg ? 'new-password' : 'current-password';
    log('// Sistema listo. Introduce tus credenciales.');
  };

  window.handleSubmit = async () => {
    const btn      = document.getElementById('btn-submit');
    const email    = document.getElementById('input-email').value.trim();
    const password = document.getElementById('input-password').value;
    const username = document.getElementById('input-username').value.trim();
    const esReg    = document.getElementById('tab-registro').classList.contains('activo');

    if (!email || !password) { log('// ERROR: Email y contrasena son obligatorios.', 'log-err'); return; }
    if (esReg && !username)  { log('// ERROR: El nombre de usuario es obligatorio.', 'log-err'); return; }
    if (password.length < 6) { log('// ERROR: La contrasena debe tener al menos 6 caracteres.', 'log-err'); return; }

    btn.disabled = true;
    log('// Conectando con el servidor...', 'log-wait');

    try {
      if (esReg) {
        await registerUser(email, password, username);
        log('// OK Cuenta creada. Redirigiendo al perfil...', 'log-ok');
      } else {
        await loginUser(email, password);
        log('// OK Autenticacion exitosa. Accediendo...', 'log-ok');
      }
      setTimeout(() => window.location.replace('/Retroterm-AI/perfil.html'), 800);
    } catch (err) {
      btn.disabled = false;
      log('// ERROR: ' + traducirError(err.code), 'log-err');
    }
  };

  window.handleGoogle = async () => {
    const btn = document.getElementById('btn-google');
    btn.disabled = true;
    log('// Conectando con Google...', 'log-wait');
    try {
      await loginWithGoogle();
      log('// OK Autenticacion con Google exitosa. Accediendo...', 'log-ok');
      setTimeout(() => window.location.replace('/Retroterm-AI/perfil.html'), 800);
    } catch (err) {
      btn.disabled = false;
      if (err.code === 'auth/popup-closed-by-user') {
        log('// Ventana cerrada. Intentalo de nuevo.', 'log-info');
      } else {
        log('// ERROR Google: ' + traducirError(err.code), 'log-err');
      }
    }
  };

  function traducirError(code) {
    const errores = {
      'auth/email-already-in-use':   'El email ya esta registrado.',
      'auth/invalid-email':          'El formato del email no es valido.',
      'auth/weak-password':          'Contrasena demasiado debil (min. 6 chars).',
      'auth/user-not-found':         'No existe una cuenta con ese email.',
      'auth/wrong-password':         'Contrasena incorrecta.',
      'auth/invalid-credential':     'Credenciales invalidas.',
      'auth/too-many-requests':      'Demasiados intentos. Espera un momento.',
      'auth/network-request-failed': 'Sin conexion. Comprueba tu red.',
    };
    return errores[code] || 'Codigo: ' + code;
  }

  document.getElementById('input-password')
    .addEventListener('keydown', function(e) { if (e.key === 'Enter') window.handleSubmit(); });
</script>

<script>
(function() {
  var canvas = document.getElementById("bg-canvas");
  if (!canvas) return;
  var ctx = canvas.getContext("2d");
  var W, H;
  var STAR_COUNT=90, WAVE_COUNT=5, CONN_DIST=180, SPEED=0.18, WAVE_SPEED=0.0004;
  var COLOR_NODE_A="rgba(0, 255, 102,", COLOR_NODE_B="rgba(255, 176, 0,";
  var COLOR_LINE="rgba(0, 220, 90,", COLOR_WAVE="rgba(255, 176, 0,";
  var stars=[], waves=[];
  function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
  function initStars(){
    stars=[];
    for(var i=0;i<STAR_COUNT;i++){
      var a=Math.random()>0.75;
      stars.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*SPEED,vy:(Math.random()-0.5)*SPEED,r:Math.random()*1.4+0.4,col:a?COLOR_NODE_B:COLOR_NODE_A,phase:Math.random()*Math.PI*2,pspeed:0.008+Math.random()*0.012});
    }
  }
  function initWaves(){
    waves=[];
    for(var i=0;i<WAVE_COUNT;i++){
      waves.push({amp:30+Math.random()*60,freq:0.003+Math.random()*0.005,phase:Math.random()*Math.PI*2,speed:(Math.random()>0.5?1:-1)*(WAVE_SPEED+Math.random()*WAVE_SPEED),yBase:(i+1)*(1/(WAVE_COUNT+1)),alpha:0.018+Math.random()*0.022});
    }
  }
  function drawWaves(){
    for(var w=0;w<waves.length;w++){
      var wv=waves[w]; wv.phase+=wv.speed*60;
      ctx.beginPath(); ctx.moveTo(0,H*wv.yBase);
      for(var x=0;x<=W;x+=4){ ctx.lineTo(x,H*wv.yBase+Math.sin(x*wv.freq+wv.phase)*wv.amp); }
      ctx.strokeStyle=COLOR_WAVE+wv.alpha+")"; ctx.lineWidth=1; ctx.stroke();
    }
  }
  function drawConnections(){
    for(var i=0;i<stars.length;i++){
      for(var j=i+1;j<stars.length;j++){
        var dx=stars[i].x-stars[j].x,dy=stars[i].y-stars[j].y,dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<CONN_DIST){ ctx.beginPath(); ctx.moveTo(stars[i].x,stars[i].y); ctx.lineTo(stars[j].x,stars[j].y); ctx.strokeStyle=COLOR_LINE+(1-dist/CONN_DIST)*0.18+")"; ctx.lineWidth=0.5; ctx.stroke(); }
      }
    }
  }
  function drawStars(){
    for(var i=0;i<stars.length;i++){
      var s=stars[i]; s.phase+=s.pspeed;
      var pulse=0.5+0.5*Math.sin(s.phase),alpha=0.25+pulse*0.55,radius=s.r*(0.8+pulse*0.4);
      var grad=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,radius*4);
      grad.addColorStop(0,s.col+(alpha*0.5)+")"); grad.addColorStop(1,s.col+"0)");
      ctx.beginPath(); ctx.arc(s.x,s.y,radius*4,0,Math.PI*2); ctx.fillStyle=grad; ctx.fill();
      ctx.beginPath(); ctx.arc(s.x,s.y,radius,0,Math.PI*2); ctx.fillStyle=s.col+alpha+")"; ctx.fill();
      s.x+=s.vx; s.y+=s.vy;
      if(s.x<-20)s.x=W+20; if(s.x>W+20)s.x=-20;
      if(s.y<-20)s.y=H+20; if(s.y>H+20)s.y=-20;
    }
  }
  function draw(){ ctx.clearRect(0,0,W,H); drawWaves(); drawConnections(); drawStars(); requestAnimationFrame(draw); }
  resize(); initStars(); initWaves(); draw();
  window.addEventListener("resize",function(){ resize(); initStars(); initWaves(); });
})();
</script>

<script src="accesibilidad.js"></script>
</body>
</html>
